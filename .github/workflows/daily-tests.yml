name: Daily Playwright Tests

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Create .env.test.local
        run: |
          printf 'VITE_SUPABASE_URL=%s\nVITE_SUPABASE_ANON_KEY=%s\nSUPABASE_SERVICE_ROLE_KEY=%s\n' \
            "$VITE_SUPABASE_URL" \
            "$VITE_SUPABASE_ANON_KEY" \
            "$SUPABASE_SERVICE_ROLE_KEY" > .env.test.local
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Run Playwright tests
        run: npx playwright test 2>&1 | tee test-output.txt || true
        env:
          FEATURE_SCHOOL_TEACHERS: '1'

      - name: Send email report
        run: |
          npm install nodemailer
          node scripts/send-test-report.mjs
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      # Publish the same HTML report `npm run test:report` shows locally, so
      # anyone can see the latest results without opening the Actions tab.
      # Runs even when tests fail -- a red report is still the truth.
      - name: Upload Playwright report to Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

  deploy-report:
    needs: test-and-report
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
